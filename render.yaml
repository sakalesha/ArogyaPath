services:
  - type: web
    name: arogyapath-api
    env: python
    rootDir: backend/nlp
    buildCommand: pip install -r requirements.txt && python -m spacy download en_core_web_md
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0
